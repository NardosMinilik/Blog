<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic meta setup for character encoding and responsiveness -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in browser tab -->
    <title>My Simple Blog</title>

    <!-- Linking external CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header section (top of the page) -->
    <header>
        <h1>My Simple Blog</h1>
        <p>Thoughts, stories, and ideas</p>
    </header>

    <!-- Main container holding blog posts -->
    <div class="container">

        <!-- Single blog post -->
        <article class="blog-post">
            <h2>Getting Started with Web Development</h2>

            <!-- Post metadata (date, author, category) -->
            <div class="post-meta">
                <span>📅 January 15, 2025</span>
                <span>✍️ Admin</span>
                <span>🏷️ Technology</span>
            </div>

            <!-- Post content -->
            <div class="post-content">
                <p>Web development is an exciting journey...</p>
            </div>

            <!-- Read more button -->
            <a href="#" class="read-more">Read More</a>
        </article>

    </div>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2025 My Simple Blog. All rights reserved.</p>
    </footer>

    <!-- Linking external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
